<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knowledge Graph — Overview</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 320px; min-width: 320px; background: #1a1a2e; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; border-right: 1px solid #2a2a4a; }
#sidebar h2 { font-size: 18px; color: #76B7B2; margin-bottom: 4px; }
#sidebar h3 { font-size: 14px; color: #9ca3af; margin-bottom: 8px; }
.nav-link { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 8px; border-radius: 4px; color: #e0e0e0; text-decoration: none; }
.nav-link:hover { background: #2a2a4a; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#graph-container { flex: 1; position: relative; }
#info { background: #0f0f1a; border-radius: 8px; padding: 12px; font-size: 13px; color: #9ca3af; }
</style>
</head>
<body>
<div id="sidebar">
    <div>
        <h2>🧠 Overview</h2>
        <p style="font-size:12px;color:#666;">Each node is a community. Click to view details.</p>
    </div>
    <div id="info">116 nodes, 140 edges, 10 communities</div>
    <div>
        <h3>Communities</h3>
        <a href="community_0.html" class="nav-link"><span class="legend-dot" style="background:#4E79A7"></span>_draw_poly_regions() (42)</a><a href="community_1.html" class="nav-link"><span class="legend-dot" style="background:#F28E2B"></span>_tokens_from_ocr() (16)</a><a href="community_2.html" class="nav-link"><span class="legend-dot" style="background:#E15759"></span>typing.Tuple (15)</a><a href="community_3.html" class="nav-link"><span class="legend-dot" style="background:#76B7B2"></span>check() (11)</a><a href="community_4.html" class="nav-link"><span class="legend-dot" style="background:#59A14F"></span>check_table() (8)</a><a href="community_5.html" class="nav-link"><span class="legend-dot" style="background:#EDC948"></span>to_ms() (7)</a><a href="community_6.html" class="nav-link"><span class="legend-dot" style="background:#B07AA1"></span>write_file() (6)</a><a href="community_7.html" class="nav-link"><span class="legend-dot" style="background:#FF9DA7"></span>_normalize_text() (5)</a><a href="community_8.html" class="nav-link"><span class="legend-dot" style="background:#9C755F"></span>_draw_tokens() (3)</a><a href="community_9.html" class="nav-link"><span class="legend-dot" style="background:#BAB0AC"></span>_run_gate_once() (3)</a>
    </div>
</div>
<div id="graph-container"></div>
<script>
(function() {
    var nodesData = [{id:4,label:"check_table() (8)",title:"check_table() (8 nodes)\\nClick to view details",color:"#59A14F",size:34.1,url:"community_4.html"},{id:0,label:"_draw_poly_regions() (42)",title:"_draw_poly_regions() (42 nodes)\\nClick to view details",color:"#4E79A7",size:52.4,url:"community_0.html"},{id:3,label:"check() (11)",title:"check() (11 nodes)\\nClick to view details",color:"#76B7B2",size:36.6,url:"community_3.html"},{id:8,label:"_draw_tokens() (3)",title:"_draw_tokens() (3 nodes)\\nClick to view details",color:"#9C755F",size:28.7,url:"community_8.html"},{id:6,label:"write_file() (6)",title:"write_file() (6 nodes)\\nClick to view details",color:"#B07AA1",size:32.2,url:"community_6.html"},{id:1,label:"_tokens_from_ocr() (16)",title:"_tokens_from_ocr() (16 nodes)\\nClick to view details",color:"#F28E2B",size:40.0,url:"community_1.html"},{id:9,label:"_run_gate_once() (3)",title:"_run_gate_once() (3 nodes)\\nClick to view details",color:"#BAB0AC",size:28.7,url:"community_9.html"},{id:5,label:"to_ms() (7)",title:"to_ms() (7 nodes)\\nClick to view details",color:"#EDC948",size:33.2,url:"community_5.html"},{id:2,label:"typing.Tuple (15)",title:"typing.Tuple (15 nodes)\\nClick to view details",color:"#E15759",size:39.4,url:"community_2.html"},{id:7,label:"_normalize_text() (5)",title:"_normalize_text() (5 nodes)\\nClick to view details",color:"#FF9DA7",size:31.2,url:"community_7.html"}];
    var edgesData = [{from:1,to:9,label:"2",width:2.4,title:"2 cross-community edges"},{from:0,to:9,label:"3",width:2.7,title:"3 cross-community edges"},{from:0,to:8,label:"3",width:2.7,title:"3 cross-community edges"},{from:2,to:7,label:"5",width:3.2,title:"5 cross-community edges"},{from:1,to:8,label:"3",width:2.7,title:"3 cross-community edges"},{from:0,to:1,label:"16",width:5.0,title:"16 cross-community edges"}];
    var container = document.getElementById('graph-container');
    var nodes = new vis.DataSet(nodesData);
    var edges = new vis.DataSet(edgesData);
    var options = {
        physics: {
            solver: 'forceAtlas2Based',
            forceAtlas2Based: { gravitationalConstant: -100, centralGravity: 0.01, springLength: 200, springConstant: 0.05, damping: 0.4 },
            stabilization: { iterations: 100 }
        },
        nodes: { shape: 'dot', font: { color: '#e0e0e0', size: 14, multi: true }, borderWidth: 2 },
        edges: { color: { color: '#4a4a6a' }, font: { color: '#888', size: 12 }, smooth: { type: 'continuous' } },
        interaction: { hover: true, zoomView: true, dragView: true }
    };
    var network = new vis.Network(container, { nodes: nodes, edges: edges }, options);
    network.on('stabilizationIterationsDone', function() { network.setOptions({ physics: { enabled: false } }); });
    network.on('doubleClick', function(params) {
        if (params.nodes.length > 0) {
            var node = nodes.get(params.nodes[0]);
            if (node && node.url) { window.location.href = node.url; }
        }
    });
})();
</script>
</body>
</html>
